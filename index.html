<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Control - Hidden Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="mission-styles.css">
    <style>
        .restricted-panel {
            border: 2px solid var(--neon-amber);
            box-shadow: 0 0 20px rgba(255, 179, 0, 0.2);
        }
        #result-display {
            margin-top: 30px;
            padding: 20px;
            display: none;
            border-radius: 4px;
            font-size: 1.2rem;
            text-align: center;
        }
        .access-granted {
            background: rgba(0, 255, 102, 0.1);
            border: 1px solid #00ff66;
            color: #00ff66;
        }
        .access-denied {
            background: rgba(255, 51, 51, 0.1);
            border: 1px solid #ff3333;
            color: #ff3333;
        }
        .flag-text {
            font-size: 2rem;
            margin-top: 15px;
            font-weight: bold;
            text-shadow: 0 0 10px #00ff66;
        }
    </style>
</head>
<body>
    <div class="container restricted-panel">
        <div class="page-status" style="color: var(--neon-amber);">RESTRICTED_ACCESS // ADM_TERMINAL_01</div>
        <h1 style="color: var(--neon-amber);">Mission Control Access</h1>
        
        <p>
            Access to mission control requires full authentication key. This station is under high-security lockdown due to the local gravitational anomaly.
        </p>

        <div id="login-form">
            <input type="password" id="pass-input" class="terminal-input" placeholder="Enter captured fragments..." autocomplete="off">
            <div class="text-center">
                <button class="btn" onclick="validateKey()">Authenticate</button>
            </div>
        </div>

        <div id="result-display"></div>

        <div class="hint-box">
            <a href="mission-home.html" style="color: #445566; text-decoration: none;">Return to Public Terminal</a>
        </div>
    </div>

    <script>
        function validateKey() {
            const input = document.getElementById('pass-input').value.trim();
            const result = document.getElementById('result-display');
            const form = document.getElementById('login-form');
            
            // Password logic: event_horizon_override
            if (input.toLowerCase() === 'event_horizon_override') {
                result.innerHTML = `
                    <div class="access-granted">
                        ACCESS GRANTED<br>
                        Welcome to Mission Control<br><br>
                        <div class="flag-text">CSE{accessing_mission_control}</div>
                    </div>
                `;
                result.style.display = 'block';
                form.style.display = 'none';
            } else {
                result.innerHTML = `
                    <div class="access-denied">
                        ACCESS DENIED<br>
                        Invalid Authentication Key.
                    </div>
                `;
                result.style.display = 'block';
                // Reset display after a few seconds
                setTimeout(() => {
                    result.style.display = 'none';
                }, 3000);
            }
        }
    </script>
</body>
</html>
